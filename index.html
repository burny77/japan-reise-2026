const RED = "#E63329", BLU = "#1457A8", YEL = "#F4B41A", BLK = "#16110D", CANVAS = "#EDE8DC", PAPER = "#FBFAF5";
const MARK = [RED, BLU, YEL, BLK, "#3D7A3D", "#7B3F9E", "#C9622B"];
const fgOn = c => (c === YEL ? BLK : "#fff");

// ─── LEAFLET LOADER ──────────────────────────────────────────
let _lfReady = false, _lfCbs = [];
function loadLeaflet(cb) {
  if (_lfReady) { cb(); return; }
  _lfCbs.push(cb);
  if (_lfCbs.length > 1) return;
  const lnk = document.createElement('link');
  lnk.rel = 'stylesheet';
  lnk.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
  document.head.appendChild(lnk);
  const sc = document.createElement('script');
  sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
  sc.onload = () => { _lfReady = true; _lfCbs.forEach(f => f()); _lfCbs = []; };
  document.body.appendChild(sc);
}

function MapView({ center, zoom, stops, height = "200px" }) {
  const divRef = useRef(null);
  const mapRef = useRef(null);
  const [rdy, setRdy] = useState(typeof window !== 'undefined' && !!window.L);
  useEffect(() => { loadLeaflet(() => setRdy(true)); }, []);
  useEffect(() => {
    if (!rdy || !divRef.current || mapRef.current) return;
    const L = window.L;
    const map = L.map(divRef.current, { zoomControl: false, scrollWheelZoom: false }).setView(center, zoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    stops.forEach((s, i) => {
      const c = MARK[i % MARK.length];
      const ic = L.divIcon({ html: `<div style="background:${c};color:${fgOn(c)};width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;border:2.5px solid #16110D;box-shadow:2px 2px 0 0 #16110D">${i+1}</div>`, className:'', iconSize:[24,24], iconAnchor:[12,12] });
      L.marker(s.c, { icon: ic }).bindPopup(`<b>${s.n}</b>`).addTo(map);
    });
    if (stops.length > 1) L.polyline(stops.map(s => s.c), { color: BLK, weight: 2.5, opacity: .6, dashArray: '1,6' }).addTo(map);
    mapRef.current = map;
    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, [rdy]);
  if (!rdy) return <div style={{ height, border:`2px solid ${BLK}` }} className="bg-stone-200 flex items-center justify-center text-xs font-bold" >KARTE LÄDT…</div>;
  return <div ref={divRef} style={{ height, width:'100%', border:`2px solid ${BLK}`, overflow:'hidden', zIndex:0 }} />;
}

function Sq({ children, color, className = "" }) {
  return <span className={`inline-flex items-center justify-center font-black ${className}`} style={{ background: color, color: fgOn(color), border: `2px solid ${BLK}` }}>{children}</span>;
}

function JapanReise() {
  const [tab, setTab] = useState("tage");
  const [exp, setExp] = useState(null);
  const cd = getTripDay();
  const isTrip = cd >= 1 && cd <= 21;
  const daysLeft = Math.ceil((TRIP_START - new Date()) / 86400000);

  useEffect(() => { if (isTrip && exp === null) setExp(cd); }, []);
  const toggle = nr => setExp(exp === nr ? null : nr);
  const gotoDay = nr => { setTab("tage"); setExp(nr); setTimeout(() => document.getElementById(`d${nr}`)?.scrollIntoView({ behavior:"smooth", block:"center" }), 60); };

  const HARD = { boxShadow: `4px 4px 0 0 ${BLK}` };
  const HARDSM = { boxShadow: `3px 3px 0 0 ${BLK}` };

  return (
    <div className="max-w-lg mx-auto min-h-screen pb-24" style={{ background: CANVAS, fontFamily: "'Helvetica Neue', Arial, sans-serif" }}>

        <div className="px-4 pt-4 pb-3">

            <span style={{ width:14, height:14, background:RED, border:`2px solid ${BLK}`, borderRadius:'50%' }}></span>

          <h1 className="font-black uppercase tracking-tighter leading-none" style={{ fontSize:'1.7rem', color:BLK }}>Japan 2026</h1>

        <div className="grid grid-cols-4" style={{ borderTop:`3px solid ${BLK}` }}>
          {[{id:"uebersicht",lb:"Überblick"},{id:"tage",lb:"Tage"},{id:"hotels",lb:"Hotels"},{id:"todos",lb:"Todos"}].map((t,i) => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className="py-2.5 text-xs font-black uppercase tracking-tight"
              style={{ background: tab===t.id ? BLK : PAPER, color: tab===t.id ? PAPER : BLK, borderRight: i<3?`2px solid ${BLK}`:'none' }}>
              {t.lb}
            </button>
          ))}
        </div>
      </div>

      <div className="px-4 py-4">

        {/* ── ÜBERBLICK ── */}
        {tab === "uebersicht" && (
          <div>
            <div className="grid grid-cols-3 gap-3 mb-5">
              {[["21","Tage",RED],["4","Umzüge",BLU],[daysLeft>0?daysLeft:"GO",daysLeft>0?"Tage noch":"Los!",YEL]].map(([v,l,c]) => (

                  <div className="font-black leading-none" style={{ fontSize:'1.9rem', color:fgOn(c) }}>{v}</div>
                  <div className="text-xs font-bold uppercase mt-1" style={{ color:fgOn(c) }}>{l}</div>

              {DAYS.map(day => {
                const today = day.nr === cd;
                const open = exp === day.nr;
                const dm = DM[day.nr];
                const oc = ORT[day.ort];
                return (
                  <div key={day.nr} id={`d${day.nr}`} style={{ background:PAPER, border:`${today?3:2}px solid ${BLK}`, ...(open?HARD:HARDSM) }}>
                    <div className="flex items-center gap-3 p-3 cursor-pointer" onClick={() => toggle(day.nr)}>
                      <Sq color={today?RED:oc} className="w-11 h-11 text-lg shrink-0">{day.nr}</Sq>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="text-xs font-bold" style={{ color:BLK }}>{day.datum}</span>
                          <span className="text-xs font-black uppercase px-1.5 py-0.5" style={{ background:oc, color:fgOn(oc), border:`1.5px solid ${BLK}` }}>{day.ort}</span>
                          {today && <span className="text-xs font-black uppercase px-1.5 py-0.5" style={{ background:BLK, color:'#fff' }}>Heute</span>}
                        </div>
                        <div className="text-xs font-medium mt-0.5" style={{ color:BLK, opacity:.55 }}>{day.strecke}</div>
                        <div className="text-sm font-bold mt-1 leading-tight" style={{ color:BLK }}>{day.top3[0]}</div>
                      </div>
                      <span className="font-black text-lg" style={{ color:BLK }}>{open?"–":"+"}</span>
                    </div>

                    {open && (
                      <div className="px-3 pb-3 space-y-3" style={{ borderTop:`2px solid ${BLK}` }}>
                        <div className="text-xs font-bold pt-2" style={{ color:BLK }}>🏨 {day.hotel}</div>

                        {dm && (
                          <div>
                            <div className="inline-block px-1.5 py-0.5 mb-1.5 text-xs font-black uppercase" style={{ background:BLU, color:'#fff' }}>Karte</div>
                            <div style={HARDSM}><MapView center={dm.c} zoom={dm.z} stops={dm.s} height="190px" /></div>
                            <div className="mt-2 space-y-0.5">
                              {dm.s.map((s,i) => (
                                <div key={i} className="flex items-center gap-1.5 text-xs" style={{ color:BLK }}>
                                  <Sq color={MARK[i%MARK.length]} className="w-4 h-4 text-[10px] shrink-0">{i+1}</Sq>
                                  <span>{s.n}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        <div>
                          <div className="inline-block px-1.5 py-0.5 mb-1.5 text-xs font-black uppercase" style={{ background:RED, color:'#fff' }}>Highlights</div>
                          {day.top3.map((t,i) => (
                            <div key={i} className="flex gap-2 text-sm mt-1" style={{ color:BLK }}>
                              <Sq color={YEL} className="w-4 h-4 text-[10px] shrink-0 mt-0.5">{i+1}</Sq><span>{t}</span>
                            </div>
                          ))}
                        </div>

                        {day.ablauf.length>0 && (
                          <div>
                            <div className="inline-block px-1.5 py-0.5 mb-2 text-xs font-black uppercase" style={{ background:BLK, color:'#fff' }}>Tagesablauf</div>
                            <div className="space-y-2.5">
                              {day.ablauf.map((r,i) => (
                                <div key={i} className="flex gap-2">
                                  <span className="text-xs font-bold w-24 shrink-0 pt-0.5" style={{ color:BLU }}>{r[0]}</span>
                                  <div className="flex-1">
                                    <div className="text-sm" style={{ color:BLK }}>{r[1]}</div>
                                    {r[3] && <div className="text-xs mt-0.5 px-1.5 py-0.5 inline-block" style={{ background:YEL, color:BLK, border:`1px solid ${BLK}` }}>👶 {r[3]}</div>}
                                  </div>
                                  <span className="text-xs font-medium shrink-0 pt-0.5" style={{ color:BLK, opacity:.5 }}>{r[2]}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        {day.info && day.info.length>0 && (
                          <div className="space-y-1.5">
                            {day.info.map((tip,i) => <div key={i} className="text-xs font-medium px-2 py-1.5" style={{ background:'#fff', color:BLK, border:`1.5px solid ${BLK}` }}>{tip}</div>)}
                          </div>
                        )}

                        {day.foodtours && (
                          <div>
                            <div className="inline-block px-1.5 py-0.5 mb-2 text-xs font-black uppercase" style={{ background:RED, color:'#fff' }}>Food Tour Optionen</div>
                            {day.foodtours.map((f,i) => (
                              <div key={i} className="mb-1.5 p-2.5" style={{ background:YEL, border:`2px solid ${BLK}` }}>
                                <div className="text-xs font-black uppercase" style={{ color:BLK }}>{f.name}</div>
                                <div className="text-xs mt-0.5" style={{ color:BLK }}>{f.detail}</div>
                              </div>
                            ))}
                          </div>
                        )}

                        {day.ryokans && (
                          <div>
                            <div className="inline-block px-1.5 py-0.5 mb-2 text-xs font-black uppercase" style={{ background:'#3D7A3D', color:'#fff' }}>Ryokan Gora</div>
                            {day.ryokans.map((r,i) => (
                              <div key={i} className="mb-1.5 p-2.5" style={{ background:'#fff', border:`2px solid ${BLK}` }}>
                                <div className="text-xs font-black uppercase" style={{ color:BLK }}>{r.name}</div>
                                <div className="text-xs mt-0.5" style={{ color:BLK }}>🚶 {r.anreise}</div>
                                <div className="text-xs" style={{ color:BLK }}>👶 {r.baby}</div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── HOTELS ── */}
        {tab === "hotels" && (
          <div>
            <div className="inline-block px-2 py-1 mb-3 text-xs font-black uppercase tracking-wide" style={{ background:BLK, color:PAPER }}>Buchungsstatus</div>
            <div className="space-y-3 mb-4">
              {HOTELS.map((h,i) => {
                const bc = { ok:'#3D7A3D', warn:YEL, error:RED, todo:'#fff', info:BLU }[h.b];
                return (
                  <div key={i} className="p-3" style={{ background:PAPER, border:`2px solid ${BLK}`, ...HARDSM }}>
                    <div className="flex justify-between items-start gap-2 flex-wrap">
                      <div className="font-black uppercase text-sm" style={{ color:BLK }}>{h.s}</div>
                      <span className="text-xs font-black uppercase px-1.5 py-0.5" style={{ background:bc, color:fgOn(bc), border:`1.5px solid ${BLK}` }}>{h.st}</span>
                    </div>
                    <div className="text-xs mt-1" style={{ color:BLK }}>{h.n}</div>
                    <div className="flex flex-wrap gap-3 mt-2 text-xs font-bold" style={{ color:BLK }}>
                      <span>📅 {h.d}</span><span>🌙 {h.nt} Nächte</span><span>💰 {h.k}</span>
                    </div>
                    <div className="flex gap-3 mt-1 text-xs" style={{ color:BLK, opacity:.7 }}>
                      <span>⏰ {h.sto}</span><span>👶 {h.bb}</span>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="p-3" style={{ background:BLU, color:'#fff', border:`2px solid ${BLK}`, ...HARDSM }}>
              <div className="font-black uppercase text-xs mb-1">💡 Strategie (Empfehlung Isabelle Friedrichs)</div>
              <div className="text-xs">Airbnb mit Küche + separatem Schlafzimmer: Baby abends rein, ihr bleibt auf. Gab es überall auf Booking für gute Preise. Viel Platz zum Krabbeln wichtig!</div>
            </div>
          </div>
        )}

        {/* ── TODOS ── */}
        {tab === "todos" && (
          <div className="space-y-4">
            {[
              {key:"kritisch",lb:"Kritisch",c:RED},
              {key:"wichtig",lb:"Wichtig",c:BLU},
              {key:"empfohlen",lb:"Empfohlen",c:YEL},
              {key:"besprechen",lb:"Zu besprechen",c:BLK},
            ].map(sec => (
              <div key={sec.key} style={{ background:PAPER, border:`2px solid ${BLK}`, ...HARDSM }}>
                <div className="px-3 py-1.5 text-sm font-black uppercase" style={{ background:sec.c, color:fgOn(sec.c) }}>{sec.lb}</div>
                <div className="p-3 space-y-2">
                  {TODOS[sec.key].map((item,i) => (
                    <div key={i} className="flex gap-2 items-start">
                      <span className="font-black shrink-0" style={{ color:sec.c===YEL?BLK:sec.c }}>☐</span>
                      <div className="text-xs" style={{ color:BLK }}>
                        {item.t}
                        {item.f && <span className="ml-1 font-black uppercase px-1 py-0.5" style={{ background:RED, color:'#fff' }}>{item.f}</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(JapanReise));
</script>
</body>
</html>
