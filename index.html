<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Japan Reise 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>body{margin:0;background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const CITY_BG = {
  "Tokio":"bg-blue-700","Kamakura":"bg-violet-700","Hakone":"bg-emerald-700",
  "Kyoto":"bg-orange-600","Osaka":"bg-red-600","Tokio → Narita":"bg-zinc-700",
};

function Badge({ label, type }) {
  const s={ok:"bg-emerald-600",warn:"bg-amber-500",error:"bg-red-600",todo:"bg-zinc-600",info:"bg-blue-700"};
  return <span className={"text-xs font-black uppercase tracking-widest px-2 py-0.5 text-white "+(s[type]||s.info)}>{label}</span>;
}

function JapanReise() {
  const [tab,setTab]=useState("tage");
  const [exp,setExp]=useState(null);
  const cd=getTripDay();
  const isTrip=cd>=1&&cd<=21;
  const daysLeft=Math.ceil((TRIP_START-new Date())/86400000);

  useEffect(()=>{if(isTrip&&exp===null)setExp(cd);},[]);
  const toggle=nr=>setExp(exp===nr?null:nr);
  const gotoDay=nr=>{
    setTab("tage");setExp(nr);
    setTimeout(()=>document.getElementById("d"+nr)?.scrollIntoView({behavior:"smooth",block:"center"}),60);
  };

  const TABS=[{id:"uebersicht",l:"ROUTE"},{id:"tage",l:"TAGE"},{id:"hotels",l:"HOTELS"},{id:"todos",l:"TODOS"}];

  return (
    <div className="max-w-lg mx-auto min-h-screen bg-white">

      <div className="bg-black text-white sticky top-0 z-20">
        <div className="px-5 py-4 border-b-4 border-red-600 flex items-end justify-between">
          <div>
            <p className="text-xs font-black uppercase tracking-widest text-red-500 mb-1">Sept 2026 — Familie + Baby</p>
            <h1 className="text-4xl font-black uppercase tracking-tighter leading-none">JAPAN</h1>
          </div>
          {isTrip&&(
            <button onClick={()=>gotoDay(cd)} className="bg-red-600 text-white font-black text-xs uppercase tracking-widest px-4 py-2 border-2 border-red-400">
              TAG {cd} →
            </button>
          )}
        </div>
        <div className="flex border-b-2 border-zinc-800">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={"flex-1 py-3 text-xs font-black uppercase tracking-widest transition-colors border-r-2 border-zinc-800 last:border-r-0 "+(tab===t.id?"bg-red-600 text-white":"text-zinc-500 hover:text-white")}>
              {t.l}
            </button>
          ))}
        </div>
      </div>

      <div className="px-4 py-4">

        {tab==="uebersicht"&&(
          <div>
            <div className="grid grid-cols-3 border-2 border-black mb-5">
              {[["21","TAGE"],["4","UMZÜGE"],[daysLeft>0?daysLeft:"✓",daysLeft>0?"TAGE NOCH":"UNTERWEGS"]].map(([v,l],i)=>(
                <div key={l} className={"p-4 text-center"+(i<2?" border-r-2 border-black":"")}>
                  <div className="text-3xl font-black">{v}</div>
                  <div className="text-xs font-black uppercase tracking-widest text-zinc-500 mt-0.5">{l}</div>
                </div>
              ))}
            </div>

            <div className="border-2 border-black mb-5">
              <div className="bg-black text-white px-4 py-2 text-xs font-black uppercase tracking-widest border-b-2 border-black">ROUTE DURCH JAPAN</div>
              <MapView center={OVERVIEW.c} zoom={OVERVIEW.z} stops={OVERVIEW.s} height="260px" />
              <div className="grid grid-cols-2 border-t-2 border-black">
                {OVERVIEW.s.map((s,i)=>(
                  <div key={i} className={"flex items-center gap-2 px-3 py-2 text-xs border-b border-zinc-200"+(i%2===0?" border-r-2 border-black":"")}>
                    <span className="w-5 h-5 flex items-center justify-center text-white text-xs font-black shrink-0"
                      style={{background:["#1D4ED8","#6D28D9","#059669","#EA580C","#1D4ED8","#DC2626","#374151","#1D4ED8"][i%8]}}>
                      {i+1}
                    </span>
                    <span className="font-medium text-zinc-700 truncate">{s.n}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="border-2 border-black">
              <div className="bg-black text-white px-4 py-2 text-xs font-black uppercase tracking-widest">21-TAGE ÜBERSICHT</div>
              {DAYS.map((day)=>(
                <div key={day.nr} onClick={()=>gotoDay(day.nr)}
                  className={"flex items-stretch cursor-pointer border-b border-zinc-200 last:border-b-0 hover:bg-zinc-50 "+(day.nr===cd?"bg-red-50":"")}>
                  <div className={"w-10 flex items-center justify-center font-black text-sm shrink-0 border-r-2 border-black"+(day.nr===cd?" bg-red-600 text-white":" bg-black text-white")}>
                    {day.nr}
                  </div>
                  <div className={"w-14 text-center text-xs font-black text-white border-r-2 border-black flex items-center justify-center px-1 "+(CITY_BG[day.ort]||"bg-zinc-700")}>
                    {day.ort.split(" →")[0].slice(0,5).toUpperCase()}
                  </div>
                  <div className="px-3 py-2.5 flex-1 min-w-0">
                    <div className="text-xs text-zinc-500 font-black uppercase tracking-wider">{day.datum}</div>
                    <div className="text-xs font-medium text-black truncate mt-0.5">{day.top3[0].replace("⭐ ","")}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="tage"&&(
          <div>
            {!isTrip&&cd<1&&(
              <div className="border-2 border-black bg-black text-white mb-4">
                <div className="px-5 py-4 flex items-center justify-between">
                  <div>
                    <p className="text-xs font-black uppercase tracking-widest text-red-400">Abreise in</p>
                    <p className="text-4xl font-black">{daysLeft} <span className="text-base font-bold">Tage</span></p>
                  </div>
                  <div className="text-6xl font-black text-red-600">→</div>
                </div>
              </div>
            )}
            {isTrip&&(
              <div className="bg-red-600 text-white mb-4 px-4 py-3 border-2 border-red-600">
                <p className="text-xs font-black uppercase tracking-widest opacity-80">Heute</p>
                <p className="text-xl font-black">TAG {cd} — {DAYS[cd-1]?.datum} — {DAYS[cd-1]?.ort.toUpperCase()}</p>
              </div>
            )}

            <div className="space-y-1.5">
              {DAYS.map(day=>{
                const today=day.nr===cd;
                const open=exp===day.nr;
                const dm=DM[day.nr];
                const cb=CITY_BG[day.ort]||"bg-zinc-700";
                return (
                  <div key={day.nr} id={"d"+day.nr} className={"border-2 "+(today?"border-red-600":"border-black")}>
                    <div className="flex items-stretch cursor-pointer" onClick={()=>toggle(day.nr)}>
                      <div className={"w-12 flex items-center justify-center font-black text-xl shrink-0 "+(today?"bg-red-600 text-white":"bg-black text-white")}>
                        {day.nr}
                      </div>
                      <div className="flex-1 px-3 py-2.5 border-l-2 border-black min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="text-xs text-zinc-500 font-black uppercase tracking-wider">{day.datum}</span>
                          <span className={"text-xs font-black uppercase px-2 py-0.5 text-white "+cb}>{day.ort}</span>
                          {today&&<span className="text-xs font-black uppercase bg-red-600 text-white px-2 py-0.5 animate-pulse">HEUTE</span>}
                        </div>
                        <div className="font-bold text-sm leading-tight text-black mt-1">{day.top3[0]}</div>
                      </div>
                      <div className="w-10 border-l-2 border-black flex items-center justify-center shrink-0">
                        <span className="font-black text-xl">{open?"−":"+"}</span>
                      </div>
                    </div>
                    {open&&(
                      <div className="border-t-2 border-black">
                        <div className="flex items-center gap-3 px-4 py-2 border-b border-zinc-200 bg-zinc-50">
                          <span className="text-xs font-black uppercase tracking-widest text-zinc-400 shrink-0">HOTEL</span>
                          <span className="text-xs font-medium text-black">{day.hotel}</span>
                        </div>

                        {dm&&(
                          <div className="border-b-2 border-black">
                            <div className="bg-black text-white px-4 py-1.5 text-xs font-black uppercase tracking-widest">KARTE</div>
                            <MapView center={dm.c} zoom={dm.z} stops={dm.s} height="200px" />
                            <div className="px-4 py-2 border-t border-zinc-200 grid grid-cols-2 gap-x-4 gap-y-0.5">
                              {dm.s.map((s,i)=>(
                                <div key={i} className="flex items-center gap-1.5 text-xs">
                                  <span className="w-4 h-4 flex items-center justify-center text-white text-xs font-black shrink-0"
                                    style={{background:["#1D4ED8","#b91c1c","#b45309","#15803d","#0369a1","#7e22ce","#be185d"][i%7]}}>
                                    {i+1}
                                  </span>
                                  <span className="text-zinc-600 truncate">{s.n}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        <div className="border-b-2 border-black">
                          <div className="bg-black text-white px-4 py-1.5 text-xs font-black uppercase tracking-widest">HIGHLIGHTS</div>
                          <div className="px-4 py-3 space-y-2">
                            {day.top3.map((t,i)=>(
                              <div key={i} className="flex gap-3 items-start">
                                <span className="w-5 h-5 bg-black text-white flex items-center justify-center text-xs font-black shrink-0 mt-0.5">{i+1}</span>
                                <span className="text-sm text-black font-medium leading-snug">{t}</span>
                              </div>
                            ))}
                          </div>
                        </div>

                        {day.ablauf&&day.ablauf.length>0&&(
                          <div className="border-b-2 border-black">
                            <div className="bg-black text-white px-4 py-1.5 text-xs font-black uppercase tracking-widest">TAGESABLAUF</div>
                            <div className="divide-y divide-zinc-100">
                              {day.ablauf.map((r,i)=>(
                                <div key={i} className="flex">
                                  <div className="w-24 shrink-0 px-4 py-2.5 border-r-2 border-black">
                                    <span className="text-xs font-black text-zinc-500">{r[0]}</span>
                                  </div>
                                  <div className="flex-1 px-4 py-2.5">
                                    <div className="text-sm text-black font-medium">{r[1]}</div>
                                    {r[3]&&<div className="text-xs text-amber-700 mt-0.5 font-medium">Baby: {r[3]}</div>}
                                  </div>
                                  <div className="w-16 shrink-0 px-2 py-2.5 border-l-2 border-black text-right">
                                    <span className="text-xs font-bold text-zinc-500">{r[2]}</span>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        {day.info&&day.info.length>0&&(
                          <div className="border-b-2 border-black">
                            <div className="bg-black text-white px-4 py-1.5 text-xs font-black uppercase tracking-widest">TIPPS & OPTIONEN</div>
                            <div className="divide-y divide-zinc-100">
                              {day.info.map((tip,i)=>(
                                <div key={i} className="px-4 py-2.5 flex gap-3">
                                  <span className="w-1.5 bg-red-600 shrink-0 self-stretch"></span>
                                  <span className="text-xs text-black font-medium">{tip}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        {day.ryokans&&(
                          <div>
                            <div className="bg-emerald-700 text-white px-4 py-1.5 text-xs font-black uppercase tracking-widest">RYOKAN-EMPFEHLUNGEN GORA</div>
                            {day.ryokans.map((r,i)=>(
                              <div key={i} className="border-t border-zinc-200 px-4 py-3 flex gap-3">
                                <div className="w-1.5 bg-emerald-700 shrink-0"></div>
                                <div>
                                  <div className="text-xs font-black text-black uppercase tracking-wide">{r.name}</div>
                                  <div className="text-xs text-zinc-600 mt-0.5">Anreise: {r.anreise}</div>
                                  <div className="text-xs text-zinc-600">Baby: {r.baby}</div>
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="hotels"&&(
          <div>
            <div className="bg-black text-white px-4 py-3 mb-4 text-xs font-black uppercase tracking-widest">BUCHUNGSSTATUS</div>
            <div className="space-y-2">
              {HOTELS.map((h,i)=>{
                const tc={ok:"bg-emerald-600",warn:"bg-amber-500",error:"bg-red-600",todo:"bg-zinc-600",info:"bg-blue-700"};
                return (
                  <div key={i} className="border-2 border-black">
                    <div className={"h-2 "+(tc[h.b]||"bg-zinc-600")}></div>
                    <div className="p-4">
                      <div className="flex justify-between items-start gap-2 flex-wrap mb-2">
                        <span className="font-black text-sm uppercase tracking-wide">{h.s}</span>
                        <Badge label={h.st} type={h.b} />
                      </div>
                      <div className="text-xs text-zinc-700 font-medium mb-2">{h.n}</div>
                      <div className="flex flex-wrap gap-x-4 gap-y-1 text-xs text-zinc-500 font-bold">
                        <span>Datum: {h.d}</span><span>Naechte: {h.nt}</span><span>Kosten: {h.k}</span><span>Storno: {h.sto}</span><span>Baby: {h.bb}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="border-2 border-black mt-4">
              <div className="bg-black text-white px-4 py-2 text-xs font-black uppercase tracking-widest">STRATEGIE</div>
              <div className="px-4 py-3 flex gap-3">
                <div className="w-1.5 bg-violet-600 shrink-0"></div>
                <p className="text-xs font-medium">Airbnb mit Küche + sep. Schlafzimmer bevorzugen. Baby schlafen legen, ihr bleibt noch auf. (Empfehlung Isabelle)</p>
              </div>
            </div>
          </div>
        )}

        {tab==="todos"&&(
          <div className="space-y-2">
            {[
              {key:"kritisch",l:"KRITISCH — FRISTEN",c:"bg-red-600"},
              {key:"wichtig",l:"WICHTIG",c:"bg-orange-500"},
              {key:"empfohlen",l:"EMPFOHLEN",c:"bg-yellow-500"},
              {key:"besprechen",l:"ZU BESPRECHEN",c:"bg-blue-700"},
            ].map(sec=>(
              <div key={sec.key} className="border-2 border-black">
                <div className={"px-4 py-2.5 text-white text-xs font-black uppercase tracking-widest "+sec.c}>{sec.l}</div>
                <div className="divide-y divide-zinc-100">
                  {TODOS[sec.key].map((item,i)=>(
                    <div key={i} className="flex gap-3 px-4 py-2.5 items-start">
                      <span className="w-4 h-4 border-2 border-black shrink-0 mt-0.5"></span>
                      <div className="flex-1">
                        <span className="text-xs text-black font-medium">{item.t}</span>
                        {item.f&&<span className="ml-2 text-xs font-black bg-red-600 text-white px-1.5 py-0.5">{item.f}</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(JapanReise));
</script>
</body>
</html>
