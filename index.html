function loadLeaflet(cb){
  if(_lf){cb();return;} _lfQ.push(cb); if(_lfQ.length>1)return;
  const l=document.createElement('link'); l.rel='stylesheet'; l.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css'; document.head.appendChild(l);

}

function MapView({center,zoom,stops,height="200px"}){
  const ref=useRef(null),mapRef=useRef(null);
  const [rdy,setRdy]=useState(typeof window!=='undefined'&&!!window.L);
  useEffect(()=>{loadLeaflet(()=>setRdy(true));},[]);
  useEffect(()=>{
    if(!rdy||!ref.current||mapRef.current)return;
    const L=window.L;
    const map=L.map(ref.current,{zoomControl:false,scrollWheelZoom:false}).setView(center,zoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
    L.control.zoom({position:'bottomright'}).addTo(map);
    const C=['#4338ca','#b91c1c','#b45309','#15803d','#0369a1','#7e22ce','#be185d'];
    stops.forEach((s,i)=>{
      const ic=L.divIcon({html:`<div style="background:${C[i%C.length]};color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;border:2.5px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.4)">${i+1}</div>`,className:'',iconSize:[24,24],iconAnchor:[12,12]});
      L.marker(s.c,{icon:ic}).bindPopup(`<b>${s.n}</b>`).addTo(map);
    });
    if(stops.length>1)L.polyline(stops.map(s=>s.c),{color:'#4338ca',weight:2,opacity:.5,dashArray:'5,5'}).addTo(map);
    mapRef.current=map;
    return()=>{if(mapRef.current){mapRef.current.remove();mapRef.current=null;}};
  },[rdy]);
  if(!rdy)return <div style={{height,borderRadius:'0'}} className="bg-zinc-100 flex items-center justify-center text-xs text-zinc-400">Karte laedt...</div>;
  return <div ref={ref} style={{height,width:'100%',overflow:'hidden',zIndex:0}} />;
}

        {tab==="hotels"&&(
          <div>
            <div className="bg-black text-white px-4 py-3 mb-4 text-xs font-black uppercase tracking-widest">BUCHUNGSSTATUS</div>
            <div className="space-y-2">
              {HOTELS.map((h,i)=>{
                const tc={ok:"bg-emerald-600",warn:"bg-amber-500",error:"bg-red-600",todo:"bg-zinc-600",info:"bg-blue-700"};
                return (
                  <div key={i} className="border-2 border-black">
                    <div className={"h-2 "+(tc[h.b]||"bg-zinc-600")}></div>
                    <div className="p-4">
                      <div className="flex justify-between items-start gap-2 flex-wrap mb-2">
                        <span className="font-black text-sm uppercase tracking-wide">{h.s}</span>
                        <Badge label={h.st} type={h.b} />
                      </div>
                      <div className="text-xs text-zinc-700 font-medium mb-2">{h.n}</div>
                      <div className="flex flex-wrap gap-x-4 gap-y-1 text-xs text-zinc-500 font-bold">
                        <span>{h.d}</span><span>{h.nt} Naechte</span><span>{h.k}</span><span>Storno: {h.sto}</span><span>Baby: {h.bb}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="border-2 border-black mt-4">
              <div className="bg-black text-white px-4 py-2 text-xs font-black uppercase tracking-widest">STRATEGIE</div>
              <div className="px-4 py-3 flex gap-3">
                <div className="w-1.5 bg-violet-600 shrink-0"></div>
                <p className="text-xs font-medium">Airbnb mit Kueche + sep. Schlafzimmer bevorzugen. Baby schlafen legen, ihr bleibt noch auf. (Empfehlung Isabelle)</p>
              </div>
            </div>
          </div>
        )}

        {tab==="todos"&&(
          <div className="space-y-2">
            {[
              {key:"kritisch",l:"KRITISCH -- FRISTEN",c:"bg-red-600"},
              {key:"wichtig",l:"WICHTIG",c:"bg-orange-500"},
              {key:"empfohlen",l:"EMPFOHLEN",c:"bg-yellow-500"},
              {key:"besprechen",l:"ZU BESPRECHEN",c:"bg-blue-700"},
            ].map(sec=>(
              <div key={sec.key} className="border-2 border-black">
                <div className={"px-4 py-2.5 text-white text-xs font-black uppercase tracking-widest "+sec.c}>{sec.l}</div>
                <div className="divide-y divide-zinc-100">
                  {TODOS[sec.key].map((item,i)=>(
                    <div key={i} className="flex gap-3 px-4 py-2.5 items-start">
                      <span className="w-4 h-4 border-2 border-black shrink-0 mt-0.5"></span>
                      <div className="flex-1">
                        <span className="text-xs text-black font-medium">{item.t}</span>
                        {item.f&&<span className="ml-2 text-xs font-black bg-red-600 text-white px-1.5 py-0.5">{item.f}</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(JapanReise));
</script>
</body>
</html>
